spring:
  application:
    name: my-service

  # ===== Database =====
  datasource:
    url: jdbc:postgresql://localhost:5432/mydb
    username: ${DB_USERNAME:myapp}
    password: ${DB_PASSWORD:secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema — never use create/create-drop
    open-in-view: false    # Avoid lazy-load surprises in controllers
    properties:
      hibernate:
        default_schema: public
        format_sql: false

  # ===== Flyway =====
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true   # NEVER allow flyway:clean in production

  # ===== Kafka =====
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 2147483647
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        spring.json.add.type.headers: false
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.example.service.messaging.event"
    listener:
      ack-mode: manual_immediate
      concurrency: 3

  # ===== Graceful Shutdown =====
  lifecycle:
    timeout-per-shutdown-phase: 30s

# ===== HTTP Server =====
server:
  port: 8080
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,text/plain

# ===== Actuator / Observability =====
management:
  server:
    port: 8081   # Bind actuator to a separate port — firewall from public traffic
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus, loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true   # /actuator/health/liveness + /actuator/health/readiness for K8s
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active:default}
  tracing:
    sampling:
      probability: 1.0   # 100% in dev/staging; set 0.1 in prod
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  info:
    env:
      enabled: true
    build:
      enabled: true
    git:
      enabled: true
      mode: simple

# ===== Actuator Info =====
info:
  app:
    name: ${spring.application.name}
    version: @project.version@
  git:
    commit: "@git.commit.id.abbrev@"

# ===== Logging =====
logging:
  level:
    root: INFO
    com.example.service: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG   # set WARN in prod
